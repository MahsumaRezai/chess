<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>شطرنج آموزشی دو نفره</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🎓 طرح شطرنج برای ارزیابی شاگردان اصول صنفی</h2>

<div id="startBox">
  <input id="name1" placeholder="نام شاگرد  1">
  <input id="name2" placeholder="نام شاگرد 2"><br>
  <button onclick="start()">شروع بازی</button>
</div>

<div id="info">
  <div id="playerWhite"></div>
  <div id="playerBlack"></div>
  نوبت: <span id="turn">سفید</span><br>
  امتیاز سفید: <span id="scoreWhite">0</span> |
  امتیاز سیاه: <span id="scoreBlack">0</span><br><br>


</div>

<div id="quizBox">
  <h3 id="qText"></h3>
  <input id="answer">
  <button onclick="check()">تایید</button>
</div>

<div id="gameBox">
  <div id="board"></div>
  <button onclick="resetGame()">🔄 شروع دوباره</button>
</div>

<script src="Script.js"></script>
</body>
</html>
